name: RFC XML Check

on: [push]

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake python3 python3-pip python3-setuptools python3-wheel ruby xmlstarlet aspell
          sudo pip3 install xml2rfc
          sudo gem install cbor-diag
          cargo install --locked cddl@0.10.1
      - name: xml2rfc
        run: |
          cmake -S . -B build -DCMAKE_INSTALL_DOCDIR=$PWD/build/install
          cmake --build build -v
          cmake --install build
      - uses: actions/upload-artifact@v4
        with:
          name: spec
          path: build/install

  deploy:
    if: github.ref == 'refs/heads/main'

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    # Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
    # However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
    concurrency:
      group: "pages"
      cancel-in-progress: false

    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4.1.7
        with:
          name: spec
          path: build/install
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/install
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
